<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2a3a"/>
      <stop offset="0.55" stop-color="#123a4d"/>
      <stop offset="1" stop-color="#16493b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2e7dce"/>
      <stop offset="1" stop-color="#3fa882"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="8" fill="url(#accent)"/>

  <!-- prism mark -->
  <g transform="translate(120,150)">
    <path d="M70 0 L150 150 L-10 150 Z" fill="none" stroke="#ffffff" stroke-width="6" stroke-linejoin="round"/>
    <line x1="70" y1="150" x2="70" y2="210" stroke="#ff6b6b" stroke-width="6" stroke-linecap="round"/>
    <line x1="46" y1="150" x2="34" y2="210" stroke="#ffd166" stroke-width="6" stroke-linecap="round"/>
    <line x1="94" y1="150" x2="106" y2="210" stroke="#4dd0e1" stroke-width="6" stroke-linecap="round"/>
  </g>

  <text x="120" y="430" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="96" font-weight="bold" fill="#ffffff">PrismSelf</text>
  <text x="124" y="500" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="34" fill="#bcd3da">Gender &#183; Psychology &#183; Relationships</text>
  <text x="124" y="552" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="26" fill="#7fa8b3">A knowledge base for self-exploration</text>
</svg>
